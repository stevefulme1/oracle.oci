---
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  NAMESPACE: oracle
  COLLECTION: oci

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ansible-core>=2.16 ansible-lint yamllint flake8

      - name: Run yamllint
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        run: yamllint -c .yamllint .

      - name: Run flake8
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        run: flake8 plugins/ --max-line-length=120 --ignore=E402,W503

      - name: Run ansible-lint
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        run: ansible-lint --strict

  sanity:
    name: Sanity (Python ${{ matrix.python }} / Ansible ${{ matrix.ansible }})
    runs-on: ubuntu-latest
    needs: ansible-lint
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - "2.16"
          - "2.17"
          - "2.18"
          - "2.20"
        python:
          - "3.12"
          - "3.13"
        exclude:
          - ansible: "2.16"
            python: "3.13"
          - ansible: "2.17"
            python: "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-core ${{ matrix.ansible }}
        run: pip install "ansible-core~=${{ matrix.ansible }}.0"

      - name: Run sanity tests
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        run: >-
          ansible-test sanity
          --python ${{ matrix.python }}
          --color yes
          -v

  unit:
    name: Unit Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: ansible-lint
    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.12"
          - "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: pip install ansible-core>=2.16 oci pytest pytest-cov

      - name: Run unit tests
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: >-
          pytest tests/unit/
          -v
          --tb=short
