---
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  NAMESPACE: oracle
  COLLECTION: oci

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ansible-core>=2.16 ansible-lint yamllint flake8

      - name: Run yamllint
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        run: yamllint -c .yamllint .

      - name: Run flake8
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        run: flake8 plugins/ --max-line-length=120 --ignore=E402,W503

      - name: Run ansible-lint
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        run: ansible-lint --strict

  sanity:
    name: Sanity (Python ${{ matrix.python }} / Ansible ${{ matrix.ansible }})
    runs-on: ubuntu-latest
    needs: ansible-lint
    strategy:
      fail-fast: false
      matrix:
        ansible:
          - "2.16"
          - "2.17"
          - "2.18"
          - "2.20"
        python:
          - "3.12"
          - "3.13"
        exclude:
          - ansible: "2.16"
            python: "3.13"
          - ansible: "2.17"
            python: "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install ansible-core ${{ matrix.ansible }}
        run: pip install "ansible-core~=${{ matrix.ansible }}.0"

      - name: Run sanity tests
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        run: >-
          ansible-test sanity
          --python ${{ matrix.python }}
          --color yes
          -v

  unit:
    name: Unit Tests (Python ${{ matrix.python }})
    runs-on: ubuntu-latest
    needs: ansible-lint
    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.12"
          - "3.13"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install dependencies
        run: pip install ansible-core>=2.16 oci pytest pytest-cov

      - name: Run unit tests
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: >-
          pytest tests/unit/
          -v
          --tb=short

  integration-mock:
    name: Integration (Mock Targets)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ansible-core>=2.16 oci

      - name: Run integration tests (mock)
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          OCI_COMPARTMENT_ID: "ocid1.compartment.oc1..mock"
          OCI_VCN_ID: "ocid1.vcn.oc1..mock"
          OCI_AVAILABILITY_DOMAIN: "Uocm:PHX-AD-1"
          OCI_NAMESPACE_NAME: "mocknamespace"
          OCI_IMAGE_ID: "ocid1.image.oc1.phx.mock"
          OCI_SUBNET_ID: "ocid1.subnet.oc1.phx.mock"
        run: >-
          ansible-test integration
          --python 3.12
          --color yes
          -v
          --allow-unsupported
        continue-on-error: true

  integration-cloud:
    name: Integration (OCI Cloud)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && secrets.OCI_TENANCY_OCID != ''
    needs: unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install ansible-core>=2.16 oci

      - name: Write OCI API key
        run: |
          mkdir -p ~/.oci
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Write OCI config
        run: |
          cat > ~/.oci/config << 'EOF'
          [DEFAULT]
          user=${{ secrets.OCI_USER_OCID }}
          fingerprint=${{ secrets.OCI_FINGERPRINT }}
          tenancy=${{ secrets.OCI_TENANCY_OCID }}
          region=us-phoenix-1
          key_file=~/.oci/oci_api_key.pem
          EOF
          chmod 600 ~/.oci/config

      - name: Run integration tests (cloud)
        working-directory: ansible_collections/${{ env.NAMESPACE }}/${{ env.COLLECTION }}
        env:
          PYTHONPATH: ${{ github.workspace }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_VCN_ID: ${{ secrets.OCI_VCN_ID }}
          OCI_NAMESPACE_NAME: ${{ secrets.OCI_NAMESPACE_NAME }}
        run: >-
          ansible-test integration
          --python 3.12
          --color yes
          -v
          --allow-unsupported
