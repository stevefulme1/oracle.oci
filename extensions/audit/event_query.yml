---
# Indirect node counting event queries for Oracle Cloud Infrastructure.
# Each entry maps a module FQCN to a jq query that extracts managed node
# identity from the module's return data for AAP 2.6+ node counting.

oracle.oci.oci_instance:
  query: >-
    .resource | select(. != null) | {
      name: ("oci_instance:" + .id),
      canonical_facts: {
        module: "oci_instance",
        instance_id: .id,
        compartment_id: .compartment_id
      },
      facts: {
        device_type: "cloud_instance",
        platform: "oracle_oci",
        infra_type: "PublicCloudOCI"
      }
    }

