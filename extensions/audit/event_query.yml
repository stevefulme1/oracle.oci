---
# extensions/audit/event_query.yml
# Indirect Node Counting query for stevefulme1.oci_cloud
stevefulme1.oci_cloud.oci_instance:
  query: >-
    {
      name: .resource.display_name,
      canonical_facts: {
        uuid: .resource.id
      },
      facts: {
        device_type: "virtual_machine"
      }
    }

stevefulme1.oci_cloud.oci_vcn:
  query: >-
    {
      name: .resource.display_name,
      canonical_facts: {
        uuid: .resource.id
      },
      facts: {
        device_type: "vpc"
      }
    }

stevefulme1.oci_cloud.oci_subnet:
  query: >-
    {
      name: .resource.display_name,
      canonical_facts: {
        uuid: .resource.id
      },
      facts: {
        device_type: "subnet"
      }
    }

stevefulme1.oci_cloud.oci_security_list:
  query: >-
    {
      name: .resource.display_name,
      canonical_facts: {
        uuid: .resource.id
      },
      facts: {
        device_type: "security_group"
      }
    }

stevefulme1.oci_cloud.oci_bucket:
  query: >-
    {
      name: .resource.name,
      canonical_facts: {
        uuid: (.resource.namespace + "/" + .resource.name)
      },
      facts: {
        device_type: "object_storage"
      }
    }
