---
# Indirect node counting event queries for Oracle Cloud Infrastructure.
# Each entry maps a module FQCN to a jq query that extracts managed node
# identity from the module's return data for AAP 2.6+ node counting.
#
# device_type values follow the Normalized Resource Taxonomy v2 (2026-03-19).
# Modules that are read-only (_facts), pure IAM (user, group, policy),
# credential artifacts (api_key, wallet), or metadata-only (tag, tag_namespace,
# log_group, events_rule, console_connection) are intentionally excluded —
# they do not represent managed infrastructure nodes.

# ---------------------------------------------------------------------------
# Compute
# ---------------------------------------------------------------------------

stevefulme1.oci_cloud.oci_instance:
  query: >-
    .resource | select(. != null) | {
      name: ("oci_instance:" + .id),
      canonical_facts: {
        module: "oci_instance",
        instance_id: .id,
        compartment_id: .compartment_id
      },
      facts: {
        device_type: "virtual_machine",
        platform: "oracle_oci",
        infra_type: "PublicCloudOCI"
      }
    }

