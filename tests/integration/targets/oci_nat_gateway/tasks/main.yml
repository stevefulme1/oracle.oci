---
- name: Create a NAT gateway
  stevefulme1.oci_cloud.oci_nat_gateway:
    compartment_id: "{{ oci_compartment_id }}"
    vcn_id: "{{ oci_nat_gateway_vcn_id }}"
    display_name: "{{ oci_nat_gateway_display_name }}"
    state: present
  register: create_result
- name: Verify NAT gateway was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_nat_gateway_display_name
      - create_result.resource.id is defined
- name: Set NAT gateway ID fact
  ansible.builtin.set_fact:
    test_nat_gateway_id: "{{ create_result.resource.id }}"
- name: Create same NAT gateway again (idempotency check)
  stevefulme1.oci_cloud.oci_nat_gateway:
    nat_gateway_id: "{{ test_nat_gateway_id }}"
    compartment_id: "{{ oci_compartment_id }}"
    vcn_id: "{{ oci_nat_gateway_vcn_id }}"
    display_name: "{{ oci_nat_gateway_display_name }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update NAT gateway display_name
  stevefulme1.oci_cloud.oci_nat_gateway:
    nat_gateway_id: "{{ test_nat_gateway_id }}"
    display_name: "{{ oci_nat_gateway_updated_display_name }}"
    state: present
  register: update_result
- name: Verify NAT gateway was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_nat_gateway_updated_display_name
- name: Delete the NAT gateway
  stevefulme1.oci_cloud.oci_nat_gateway:
    nat_gateway_id: "{{ test_nat_gateway_id }}"
    state: absent
  register: delete_result
- name: Verify NAT gateway was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete NAT gateway again (already gone)
  stevefulme1.oci_cloud.oci_nat_gateway:
    nat_gateway_id: "{{ test_nat_gateway_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
