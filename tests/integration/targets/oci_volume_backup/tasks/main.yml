---
- name: Create a block volume for backup testing
  stevefulme1.oci_cloud.oci_volume:
    compartment_id: "{{ oci_compartment_id }}"
    availability_domain: "{{ oci_volume_backup_availability_domain }}"
    display_name: "{{ oci_volume_backup_source_volume_name }}"
    size_in_gbs: 50
    state: present
  register: source_volume
- name: Set source volume ID fact
  ansible.builtin.set_fact:
    test_source_volume_id: "{{ source_volume.resource.id }}"
- name: Create a volume backup
  stevefulme1.oci_cloud.oci_volume_backup:
    volume_id: "{{ test_source_volume_id }}"
    display_name: "{{ oci_volume_backup_display_name }}"
    type: FULL
    state: present
  register: create_result
- name: Verify volume backup was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_volume_backup_display_name
      - create_result.resource.id is defined
- name: Set volume backup ID fact
  ansible.builtin.set_fact:
    test_volume_backup_id: "{{ create_result.resource.id }}"
- name: Create same volume backup again (idempotency check)
  stevefulme1.oci_cloud.oci_volume_backup:
    volume_backup_id: "{{ test_volume_backup_id }}"
    volume_id: "{{ test_source_volume_id }}"
    display_name: "{{ oci_volume_backup_display_name }}"
    type: FULL
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update volume backup display_name
  stevefulme1.oci_cloud.oci_volume_backup:
    volume_backup_id: "{{ test_volume_backup_id }}"
    display_name: "{{ oci_volume_backup_updated_display_name }}"
    state: present
  register: update_result
- name: Verify volume backup was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_volume_backup_updated_display_name
- name: Delete the volume backup
  stevefulme1.oci_cloud.oci_volume_backup:
    volume_backup_id: "{{ test_volume_backup_id }}"
    state: absent
  register: delete_result
- name: Verify volume backup was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete volume backup again (already gone)
  stevefulme1.oci_cloud.oci_volume_backup:
    volume_backup_id: "{{ test_volume_backup_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
- name: Clean up source volume
  stevefulme1.oci_cloud.oci_volume:
    volume_id: "{{ test_source_volume_id }}"
    state: absent
