---
- name: Create a Functions function
  stevefulme1.oci_cloud.oci_functions_function:
    application_id: "{{ oci_functions_function_application_id }}"
    display_name: "{{ oci_functions_function_display_name }}"
    image: "{{ oci_functions_function_image }}"
    memory_in_mbs: "{{ oci_functions_function_memory_in_mbs | default(128) }}"
    timeout_in_seconds: "{{ oci_functions_function_timeout_in_seconds | default(30) }}"
    state: present
  register: create_result
- name: Verify Functions function was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_functions_function_display_name
      - create_result.resource.lifecycle_state == "ACTIVE"
      - create_result.resource.id is defined
- name: Set Functions function ID fact
  ansible.builtin.set_fact:
    test_functions_function_id: "{{ create_result.resource.id }}"
- name: Create same Functions function again (idempotency check)
  stevefulme1.oci_cloud.oci_functions_function:
    application_id: "{{ oci_functions_function_application_id }}"
    function_id: "{{ test_functions_function_id }}"
    display_name: "{{ oci_functions_function_display_name }}"
    image: "{{ oci_functions_function_image }}"
    memory_in_mbs: "{{ oci_functions_function_memory_in_mbs | default(128) }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update Functions function memory
  stevefulme1.oci_cloud.oci_functions_function:
    application_id: "{{ oci_functions_function_application_id }}"
    function_id: "{{ test_functions_function_id }}"
    display_name: "{{ oci_functions_function_display_name }}"
    image: "{{ oci_functions_function_image }}"
    memory_in_mbs: "{{ oci_functions_function_updated_memory_in_mbs }}"
    state: present
  register: update_result
- name: Verify Functions function was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.memory_in_mbs == oci_functions_function_updated_memory_in_mbs
- name: Delete the Functions function
  stevefulme1.oci_cloud.oci_functions_function:
    function_id: "{{ test_functions_function_id }}"
    state: absent
  register: delete_result
- name: Verify Functions function was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete Functions function again (already gone)
  stevefulme1.oci_cloud.oci_functions_function:
    function_id: "{{ test_functions_function_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
