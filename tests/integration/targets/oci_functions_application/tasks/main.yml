---
- name: Create a Functions application
  stevefulme1.oci_cloud.oci_functions_application:
    compartment_id: "{{ oci_functions_application_compartment_id }}"
    display_name: "{{ oci_functions_application_display_name }}"
    subnet_ids: "{{ oci_functions_application_subnet_ids }}"
    state: present
  register: create_result
- name: Verify Functions application was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_functions_application_display_name
      - create_result.resource.lifecycle_state == "ACTIVE"
      - create_result.resource.id is defined
- name: Set Functions application ID fact
  ansible.builtin.set_fact:
    test_functions_application_id: "{{ create_result.resource.id }}"
- name: Create same Functions application again (idempotency check)
  stevefulme1.oci_cloud.oci_functions_application:
    compartment_id: "{{ oci_functions_application_compartment_id }}"
    application_id: "{{ test_functions_application_id }}"
    display_name: "{{ oci_functions_application_display_name }}"
    subnet_ids: "{{ oci_functions_application_subnet_ids }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update Functions application display_name
  stevefulme1.oci_cloud.oci_functions_application:
    compartment_id: "{{ oci_functions_application_compartment_id }}"
    application_id: "{{ test_functions_application_id }}"
    display_name: "{{ oci_functions_application_updated_display_name }}"
    subnet_ids: "{{ oci_functions_application_subnet_ids }}"
    state: present
  register: update_result
- name: Verify Functions application was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_functions_application_updated_display_name
- name: Delete the Functions application
  stevefulme1.oci_cloud.oci_functions_application:
    application_id: "{{ test_functions_application_id }}"
    state: absent
  register: delete_result
- name: Verify Functions application was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete Functions application again (already gone)
  stevefulme1.oci_cloud.oci_functions_application:
    application_id: "{{ test_functions_application_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
