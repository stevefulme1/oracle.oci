---
- name: Create a MySQL DB System
  stevefulme1.oci_cloud.oci_mysql_db_system:
    compartment_id: "{{ oci_mysql_db_system_compartment_id }}"
    availability_domain: "{{ oci_mysql_db_system_availability_domain }}"
    shape_name: "{{ oci_mysql_db_system_shape_name }}"
    subnet_id: "{{ oci_mysql_db_system_subnet_id }}"
    admin_username: "{{ oci_mysql_db_system_admin_username }}"
    admin_password: "{{ oci_mysql_db_system_admin_password }}"
    display_name: "{{ oci_mysql_db_system_display_name }}"
    data_storage_size_in_gbs: "{{ oci_mysql_db_system_data_storage_size_in_gbs }}"
    state: present
  register: create_result
- name: Verify MySQL DB System was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_mysql_db_system_display_name
      - create_result.resource.id is defined
- name: Set MySQL DB System ID fact
  ansible.builtin.set_fact:
    test_mysql_db_system_id: "{{ create_result.resource.id }}"
- name: Create same MySQL DB System again (idempotency check)
  stevefulme1.oci_cloud.oci_mysql_db_system:
    compartment_id: "{{ oci_mysql_db_system_compartment_id }}"
    db_system_id: "{{ test_mysql_db_system_id }}"
    availability_domain: "{{ oci_mysql_db_system_availability_domain }}"
    shape_name: "{{ oci_mysql_db_system_shape_name }}"
    subnet_id: "{{ oci_mysql_db_system_subnet_id }}"
    admin_username: "{{ oci_mysql_db_system_admin_username }}"
    admin_password: "{{ oci_mysql_db_system_admin_password }}"
    display_name: "{{ oci_mysql_db_system_display_name }}"
    data_storage_size_in_gbs: "{{ oci_mysql_db_system_data_storage_size_in_gbs }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update MySQL DB System display_name
  stevefulme1.oci_cloud.oci_mysql_db_system:
    db_system_id: "{{ test_mysql_db_system_id }}"
    display_name: "{{ oci_mysql_db_system_updated_display_name }}"
    state: present
  register: update_result
- name: Verify MySQL DB System was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_mysql_db_system_updated_display_name
- name: Delete the MySQL DB System
  stevefulme1.oci_cloud.oci_mysql_db_system:
    db_system_id: "{{ test_mysql_db_system_id }}"
    state: absent
  register: delete_result
- name: Verify MySQL DB System was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete MySQL DB System again (already gone)
  stevefulme1.oci_cloud.oci_mysql_db_system:
    db_system_id: "{{ test_mysql_db_system_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
