---
- name: Create a customer secret key
  stevefulme1.oci_cloud.oci_customer_secret_key:
    user_id: "{{ oci_customer_secret_key_user_id }}"
    display_name: "{{ oci_customer_secret_key_display_name }}"
    state: present
  register: create_result
- name: Verify customer secret key was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_customer_secret_key_display_name
      - create_result.resource.id is defined
- name: Set customer secret key ID fact
  ansible.builtin.set_fact:
    test_customer_secret_key_id: "{{ create_result.resource.id }}"
- name: Create same customer secret key again (idempotency check)
  stevefulme1.oci_cloud.oci_customer_secret_key:
    user_id: "{{ oci_customer_secret_key_user_id }}"
    customer_secret_key_id: "{{ test_customer_secret_key_id }}"
    display_name: "{{ oci_customer_secret_key_display_name }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update customer secret key display_name
  stevefulme1.oci_cloud.oci_customer_secret_key:
    user_id: "{{ oci_customer_secret_key_user_id }}"
    customer_secret_key_id: "{{ test_customer_secret_key_id }}"
    display_name: "{{ oci_customer_secret_key_updated_display_name }}"
    state: present
  register: update_result
- name: Verify customer secret key was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_customer_secret_key_updated_display_name
- name: Delete the customer secret key
  stevefulme1.oci_cloud.oci_customer_secret_key:
    user_id: "{{ oci_customer_secret_key_user_id }}"
    customer_secret_key_id: "{{ test_customer_secret_key_id }}"
    state: absent
  register: delete_result
- name: Verify customer secret key was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete customer secret key again (already gone)
  stevefulme1.oci_cloud.oci_customer_secret_key:
    user_id: "{{ oci_customer_secret_key_user_id }}"
    customer_secret_key_id: "{{ test_customer_secret_key_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
