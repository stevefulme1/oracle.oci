---
- name: Create a log
  stevefulme1.oci_cloud.oci_log:
    log_group_id: "{{ oci_log_log_group_id }}"
    display_name: "{{ oci_log_display_name }}"
    log_type: "{{ oci_log_log_type | default('CUSTOM') }}"
    is_enabled: "{{ oci_log_is_enabled | default(true) }}"
    state: present
  register: create_result
- name: Verify log was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_log_display_name
      - create_result.resource.lifecycle_state == "ACTIVE"
      - create_result.resource.id is defined
- name: Set log ID fact
  ansible.builtin.set_fact:
    test_log_id: "{{ create_result.resource.id }}"
- name: Create same log again (idempotency check)
  stevefulme1.oci_cloud.oci_log:
    log_group_id: "{{ oci_log_log_group_id }}"
    log_id: "{{ test_log_id }}"
    display_name: "{{ oci_log_display_name }}"
    log_type: "{{ oci_log_log_type | default('CUSTOM') }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update log display_name
  stevefulme1.oci_cloud.oci_log:
    log_group_id: "{{ oci_log_log_group_id }}"
    log_id: "{{ test_log_id }}"
    display_name: "{{ oci_log_updated_display_name }}"
    log_type: "{{ oci_log_log_type | default('CUSTOM') }}"
    state: present
  register: update_result
- name: Verify log was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_log_updated_display_name
- name: Delete the log
  stevefulme1.oci_cloud.oci_log:
    log_group_id: "{{ oci_log_log_group_id }}"
    log_id: "{{ test_log_id }}"
    state: absent
  register: delete_result
- name: Verify log was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete log again (already gone)
  stevefulme1.oci_cloud.oci_log:
    log_group_id: "{{ oci_log_log_group_id }}"
    log_id: "{{ test_log_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
