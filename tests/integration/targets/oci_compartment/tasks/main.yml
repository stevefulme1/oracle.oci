---
- name: Create a compartment
  stevefulme1.oci_cloud.oci_compartment:
    parent_compartment_id: "{{ oci_compartment_parent_compartment_id }}"
    name: "{{ oci_compartment_name }}"
    description: "{{ oci_compartment_description }}"
    state: present
  register: create_result
- name: Verify compartment was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.name == oci_compartment_name
      - create_result.resource.description == oci_compartment_description
      - create_result.resource.id is defined
- name: Set compartment ID fact
  ansible.builtin.set_fact:
    test_compartment_id: "{{ create_result.resource.id }}"
- name: Create same compartment again (idempotency check)
  stevefulme1.oci_cloud.oci_compartment:
    parent_compartment_id: "{{ oci_compartment_parent_compartment_id }}"
    compartment_id: "{{ test_compartment_id }}"
    name: "{{ oci_compartment_name }}"
    description: "{{ oci_compartment_description }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update compartment description
  stevefulme1.oci_cloud.oci_compartment:
    compartment_id: "{{ test_compartment_id }}"
    description: "{{ oci_compartment_updated_description }}"
    state: present
  register: update_result
- name: Verify compartment was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.description == oci_compartment_updated_description
- name: Delete the compartment
  stevefulme1.oci_cloud.oci_compartment:
    compartment_id: "{{ test_compartment_id }}"
    state: absent
  register: delete_result
- name: Verify compartment was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete compartment again (already gone)
  stevefulme1.oci_cloud.oci_compartment:
    compartment_id: "{{ test_compartment_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
