---
- name: Create an API gateway
  stevefulme1.oci_cloud.oci_api_gateway:
    compartment_id: "{{ oci_api_gateway_compartment_id }}"
    display_name: "{{ oci_api_gateway_display_name }}"
    endpoint_type: "{{ oci_api_gateway_endpoint_type | default('PUBLIC') }}"
    subnet_id: "{{ oci_api_gateway_subnet_id }}"
    state: present
  register: create_result
- name: Verify API gateway was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_api_gateway_display_name
      - create_result.resource.lifecycle_state == "ACTIVE"
      - create_result.resource.id is defined
- name: Set API gateway ID fact
  ansible.builtin.set_fact:
    test_api_gateway_id: "{{ create_result.resource.id }}"
- name: Create same API gateway again (idempotency check)
  stevefulme1.oci_cloud.oci_api_gateway:
    compartment_id: "{{ oci_api_gateway_compartment_id }}"
    gateway_id: "{{ test_api_gateway_id }}"
    display_name: "{{ oci_api_gateway_display_name }}"
    endpoint_type: "{{ oci_api_gateway_endpoint_type | default('PUBLIC') }}"
    subnet_id: "{{ oci_api_gateway_subnet_id }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update API gateway display_name
  stevefulme1.oci_cloud.oci_api_gateway:
    compartment_id: "{{ oci_api_gateway_compartment_id }}"
    gateway_id: "{{ test_api_gateway_id }}"
    display_name: "{{ oci_api_gateway_updated_display_name }}"
    endpoint_type: "{{ oci_api_gateway_endpoint_type | default('PUBLIC') }}"
    subnet_id: "{{ oci_api_gateway_subnet_id }}"
    state: present
  register: update_result
- name: Verify API gateway was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_api_gateway_updated_display_name
- name: Delete the API gateway
  stevefulme1.oci_cloud.oci_api_gateway:
    gateway_id: "{{ test_api_gateway_id }}"
    state: absent
  register: delete_result
- name: Verify API gateway was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete API gateway again (already gone)
  stevefulme1.oci_cloud.oci_api_gateway:
    gateway_id: "{{ test_api_gateway_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
