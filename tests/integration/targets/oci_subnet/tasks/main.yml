---
- name: Create a subnet
  oracle.oci.oci_subnet:
    compartment_id: "{{ oci_subnet_compartment_id }}"
    vcn_id: "{{ oci_subnet_vcn_id }}"
    cidr_block: "{{ oci_subnet_cidr_block }}"
    display_name: "{{ oci_subnet_display_name }}"
    dns_label: "{{ oci_subnet_dns_label }}"
    availability_domain: "{{ oci_subnet_availability_domain }}"
    state: present
  register: create_result

- name: Verify subnet was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_subnet_display_name
      - create_result.resource.cidr_block == oci_subnet_cidr_block
      - create_result.resource.lifecycle_state == "AVAILABLE"
      - create_result.resource.id is defined

- name: Set subnet ID fact
  ansible.builtin.set_fact:
    test_subnet_id: "{{ create_result.resource.id }}"

- name: Create same subnet again (idempotency check)
  oracle.oci.oci_subnet:
    compartment_id: "{{ oci_subnet_compartment_id }}"
    vcn_id: "{{ oci_subnet_vcn_id }}"
    cidr_block: "{{ oci_subnet_cidr_block }}"
    subnet_id: "{{ test_subnet_id }}"
    display_name: "{{ oci_subnet_display_name }}"
    state: present
  register: idempotent_result

- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed

- name: Update subnet display_name
  oracle.oci.oci_subnet:
    compartment_id: "{{ oci_subnet_compartment_id }}"
    vcn_id: "{{ oci_subnet_vcn_id }}"
    cidr_block: "{{ oci_subnet_cidr_block }}"
    subnet_id: "{{ test_subnet_id }}"
    display_name: "{{ oci_subnet_updated_display_name }}"
    state: present
  register: update_result

- name: Verify subnet was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_subnet_updated_display_name

- name: Delete the subnet
  oracle.oci.oci_subnet:
    subnet_id: "{{ test_subnet_id }}"
    state: absent
  register: delete_result

- name: Verify subnet was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed

- name: Delete subnet again (already gone)
  oracle.oci.oci_subnet:
    subnet_id: "{{ test_subnet_id }}"
    state: absent
  register: delete_again_result

- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
