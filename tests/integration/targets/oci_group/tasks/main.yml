---
- name: Create a group
  stevefulme1.oci_cloud.oci_group:
    compartment_id: "{{ oci_group_compartment_id }}"
    name: "{{ oci_group_name }}"
    description: "{{ oci_group_description }}"
    state: present
  register: create_result
- name: Verify group was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.name == oci_group_name
      - create_result.resource.description == oci_group_description
      - create_result.resource.id is defined
- name: Set group ID fact
  ansible.builtin.set_fact:
    test_group_id: "{{ create_result.resource.id }}"
- name: Create same group again (idempotency check)
  stevefulme1.oci_cloud.oci_group:
    compartment_id: "{{ oci_group_compartment_id }}"
    group_id: "{{ test_group_id }}"
    name: "{{ oci_group_name }}"
    description: "{{ oci_group_description }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update group description
  stevefulme1.oci_cloud.oci_group:
    group_id: "{{ test_group_id }}"
    description: "{{ oci_group_updated_description }}"
    state: present
  register: update_result
- name: Verify group was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.description == oci_group_updated_description
- name: Delete the group
  stevefulme1.oci_cloud.oci_group:
    group_id: "{{ test_group_id }}"
    state: absent
  register: delete_result
- name: Verify group was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete group again (already gone)
  stevefulme1.oci_cloud.oci_group:
    group_id: "{{ test_group_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
