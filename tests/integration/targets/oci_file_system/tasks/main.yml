---
- name: Create a file system
  stevefulme1.oci_cloud.oci_file_system:
    compartment_id: "{{ oci_compartment_id }}"
    availability_domain: "{{ oci_file_system_availability_domain }}"
    display_name: "{{ oci_file_system_display_name }}"
    state: present
  register: create_result
- name: Verify file system was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_file_system_display_name
      - create_result.resource.id is defined
- name: Set file system ID fact
  ansible.builtin.set_fact:
    test_file_system_id: "{{ create_result.resource.id }}"
- name: Create same file system again (idempotency check)
  stevefulme1.oci_cloud.oci_file_system:
    file_system_id: "{{ test_file_system_id }}"
    compartment_id: "{{ oci_compartment_id }}"
    availability_domain: "{{ oci_file_system_availability_domain }}"
    display_name: "{{ oci_file_system_display_name }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update file system display_name
  stevefulme1.oci_cloud.oci_file_system:
    file_system_id: "{{ test_file_system_id }}"
    display_name: "{{ oci_file_system_updated_display_name }}"
    state: present
  register: update_result
- name: Verify file system was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_file_system_updated_display_name
- name: Delete the file system
  stevefulme1.oci_cloud.oci_file_system:
    file_system_id: "{{ test_file_system_id }}"
    state: absent
  register: delete_result
- name: Verify file system was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete file system again (already gone)
  stevefulme1.oci_cloud.oci_file_system:
    file_system_id: "{{ test_file_system_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
