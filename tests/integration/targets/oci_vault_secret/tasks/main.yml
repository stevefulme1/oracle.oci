---
- name: Create a vault secret
  stevefulme1.oci_cloud.oci_vault_secret:
    compartment_id: "{{ oci_vault_secret_compartment_id }}"
    vault_id: "{{ oci_vault_secret_vault_id }}"
    key_id: "{{ oci_vault_secret_key_id }}"
    secret_name: "{{ oci_vault_secret_secret_name }}"
    description: "{{ oci_vault_secret_description | default(omit) }}"
    secret_content:
      content_type: BASE64
      content: "{{ oci_vault_secret_content }}"
    state: present
  register: create_result
- name: Verify vault secret was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.secret_name == oci_vault_secret_secret_name
      - create_result.resource.lifecycle_state == "ACTIVE"
      - create_result.resource.id is defined
- name: Set vault secret ID fact
  ansible.builtin.set_fact:
    test_vault_secret_id: "{{ create_result.resource.id }}"
- name: Create same vault secret again (idempotency check)
  stevefulme1.oci_cloud.oci_vault_secret:
    compartment_id: "{{ oci_vault_secret_compartment_id }}"
    vault_id: "{{ oci_vault_secret_vault_id }}"
    key_id: "{{ oci_vault_secret_key_id }}"
    secret_id: "{{ test_vault_secret_id }}"
    secret_name: "{{ oci_vault_secret_secret_name }}"
    secret_content:
      content_type: BASE64
      content: "{{ oci_vault_secret_content }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update vault secret description
  stevefulme1.oci_cloud.oci_vault_secret:
    compartment_id: "{{ oci_vault_secret_compartment_id }}"
    vault_id: "{{ oci_vault_secret_vault_id }}"
    key_id: "{{ oci_vault_secret_key_id }}"
    secret_id: "{{ test_vault_secret_id }}"
    secret_name: "{{ oci_vault_secret_secret_name }}"
    description: "{{ oci_vault_secret_updated_description }}"
    secret_content:
      content_type: BASE64
      content: "{{ oci_vault_secret_content }}"
    state: present
  register: update_result
- name: Verify vault secret was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.description == oci_vault_secret_updated_description
- name: Delete the vault secret
  stevefulme1.oci_cloud.oci_vault_secret:
    secret_id: "{{ test_vault_secret_id }}"
    state: absent
  register: delete_result
- name: Verify vault secret was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete vault secret again (already gone)
  stevefulme1.oci_cloud.oci_vault_secret:
    secret_id: "{{ test_vault_secret_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
