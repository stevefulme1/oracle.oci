---
- name: Create an alarm
  stevefulme1.oci_cloud.oci_alarm:
    compartment_id: "{{ oci_alarm_compartment_id }}"
    display_name: "{{ oci_alarm_display_name }}"
    metric_compartment_id: "{{ oci_alarm_metric_compartment_id }}"
    namespace: "{{ oci_alarm_namespace }}"
    query: "{{ oci_alarm_query }}"
    severity: "{{ oci_alarm_severity | default('CRITICAL') }}"
    destinations: "{{ oci_alarm_destinations }}"
    is_enabled: "{{ oci_alarm_is_enabled | default(true) }}"
    state: present
  register: create_result
- name: Verify alarm was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_alarm_display_name
      - create_result.resource.lifecycle_state == "ACTIVE"
      - create_result.resource.id is defined
- name: Set alarm ID fact
  ansible.builtin.set_fact:
    test_alarm_id: "{{ create_result.resource.id }}"
- name: Create same alarm again (idempotency check)
  stevefulme1.oci_cloud.oci_alarm:
    compartment_id: "{{ oci_alarm_compartment_id }}"
    alarm_id: "{{ test_alarm_id }}"
    display_name: "{{ oci_alarm_display_name }}"
    metric_compartment_id: "{{ oci_alarm_metric_compartment_id }}"
    namespace: "{{ oci_alarm_namespace }}"
    query: "{{ oci_alarm_query }}"
    severity: "{{ oci_alarm_severity | default('CRITICAL') }}"
    destinations: "{{ oci_alarm_destinations }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update alarm display_name
  stevefulme1.oci_cloud.oci_alarm:
    compartment_id: "{{ oci_alarm_compartment_id }}"
    alarm_id: "{{ test_alarm_id }}"
    display_name: "{{ oci_alarm_updated_display_name }}"
    metric_compartment_id: "{{ oci_alarm_metric_compartment_id }}"
    namespace: "{{ oci_alarm_namespace }}"
    query: "{{ oci_alarm_query }}"
    severity: "{{ oci_alarm_severity | default('CRITICAL') }}"
    destinations: "{{ oci_alarm_destinations }}"
    state: present
  register: update_result
- name: Verify alarm was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_alarm_updated_display_name
- name: Delete the alarm
  stevefulme1.oci_cloud.oci_alarm:
    alarm_id: "{{ test_alarm_id }}"
    state: absent
  register: delete_result
- name: Verify alarm was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete alarm again (already gone)
  stevefulme1.oci_cloud.oci_alarm:
    alarm_id: "{{ test_alarm_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
