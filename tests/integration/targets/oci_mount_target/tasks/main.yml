---
- name: Create a mount target
  stevefulme1.oci_cloud.oci_mount_target:
    compartment_id: "{{ oci_compartment_id }}"
    availability_domain: "{{ oci_mount_target_availability_domain }}"
    subnet_id: "{{ oci_mount_target_subnet_id }}"
    display_name: "{{ oci_mount_target_display_name }}"
    state: present
  register: create_result
- name: Verify mount target was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_mount_target_display_name
      - create_result.resource.id is defined
- name: Set mount target ID fact
  ansible.builtin.set_fact:
    test_mount_target_id: "{{ create_result.resource.id }}"
- name: Create same mount target again (idempotency check)
  stevefulme1.oci_cloud.oci_mount_target:
    mount_target_id: "{{ test_mount_target_id }}"
    compartment_id: "{{ oci_compartment_id }}"
    availability_domain: "{{ oci_mount_target_availability_domain }}"
    subnet_id: "{{ oci_mount_target_subnet_id }}"
    display_name: "{{ oci_mount_target_display_name }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update mount target display_name
  stevefulme1.oci_cloud.oci_mount_target:
    mount_target_id: "{{ test_mount_target_id }}"
    display_name: "{{ oci_mount_target_updated_display_name }}"
    state: present
  register: update_result
- name: Verify mount target was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_mount_target_updated_display_name
- name: Delete the mount target
  stevefulme1.oci_cloud.oci_mount_target:
    mount_target_id: "{{ test_mount_target_id }}"
    state: absent
  register: delete_result
- name: Verify mount target was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete mount target again (already gone)
  stevefulme1.oci_cloud.oci_mount_target:
    mount_target_id: "{{ test_mount_target_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
