---
- name: Create an OKE cluster
  stevefulme1.oci_cloud.oci_oke_cluster:
    compartment_id: "{{ oci_oke_cluster_compartment_id }}"
    name: "{{ oci_oke_cluster_name }}"
    vcn_id: "{{ oci_oke_cluster_vcn_id }}"
    kubernetes_version: "{{ oci_oke_cluster_kubernetes_version }}"
    state: present
  register: create_result
- name: Verify OKE cluster was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.name == oci_oke_cluster_name
      - create_result.resource.lifecycle_state == "ACTIVE"
      - create_result.resource.id is defined
- name: Set OKE cluster ID fact
  ansible.builtin.set_fact:
    test_oke_cluster_id: "{{ create_result.resource.id }}"
- name: Create same OKE cluster again (idempotency check)
  stevefulme1.oci_cloud.oci_oke_cluster:
    compartment_id: "{{ oci_oke_cluster_compartment_id }}"
    cluster_id: "{{ test_oke_cluster_id }}"
    name: "{{ oci_oke_cluster_name }}"
    vcn_id: "{{ oci_oke_cluster_vcn_id }}"
    kubernetes_version: "{{ oci_oke_cluster_kubernetes_version }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update OKE cluster name
  stevefulme1.oci_cloud.oci_oke_cluster:
    compartment_id: "{{ oci_oke_cluster_compartment_id }}"
    cluster_id: "{{ test_oke_cluster_id }}"
    name: "{{ oci_oke_cluster_updated_name }}"
    vcn_id: "{{ oci_oke_cluster_vcn_id }}"
    kubernetes_version: "{{ oci_oke_cluster_kubernetes_version }}"
    state: present
  register: update_result
- name: Verify OKE cluster was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.name == oci_oke_cluster_updated_name
- name: Delete the OKE cluster
  stevefulme1.oci_cloud.oci_oke_cluster:
    cluster_id: "{{ test_oke_cluster_id }}"
    state: absent
  register: delete_result
- name: Verify OKE cluster was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete OKE cluster again (already gone)
  stevefulme1.oci_cloud.oci_oke_cluster:
    cluster_id: "{{ test_oke_cluster_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
