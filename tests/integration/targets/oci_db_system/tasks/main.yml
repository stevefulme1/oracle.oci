---
- name: Create a DB System
  stevefulme1.oci_cloud.oci_db_system:
    compartment_id: "{{ oci_db_system_compartment_id }}"
    availability_domain: "{{ oci_db_system_availability_domain }}"
    shape: "{{ oci_db_system_shape }}"
    ssh_public_keys: "{{ oci_db_system_ssh_public_keys }}"
    subnet_id: "{{ oci_db_system_subnet_id }}"
    hostname: "{{ oci_db_system_hostname }}"
    display_name: "{{ oci_db_system_display_name }}"
    db_home: "{{ oci_db_system_db_home }}"
    state: present
  register: create_result
- name: Verify DB System was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_db_system_display_name
      - create_result.resource.id is defined
- name: Set DB System ID fact
  ansible.builtin.set_fact:
    test_db_system_id: "{{ create_result.resource.id }}"
- name: Create same DB System again (idempotency check)
  stevefulme1.oci_cloud.oci_db_system:
    compartment_id: "{{ oci_db_system_compartment_id }}"
    db_system_id: "{{ test_db_system_id }}"
    availability_domain: "{{ oci_db_system_availability_domain }}"
    shape: "{{ oci_db_system_shape }}"
    ssh_public_keys: "{{ oci_db_system_ssh_public_keys }}"
    subnet_id: "{{ oci_db_system_subnet_id }}"
    hostname: "{{ oci_db_system_hostname }}"
    display_name: "{{ oci_db_system_display_name }}"
    db_home: "{{ oci_db_system_db_home }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update DB System display_name
  stevefulme1.oci_cloud.oci_db_system:
    db_system_id: "{{ test_db_system_id }}"
    display_name: "{{ oci_db_system_updated_display_name }}"
    state: present
  register: update_result
- name: Verify DB System was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_db_system_updated_display_name
- name: Delete the DB System
  stevefulme1.oci_cloud.oci_db_system:
    db_system_id: "{{ test_db_system_id }}"
    state: absent
  register: delete_result
- name: Verify DB System was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete DB System again (already gone)
  stevefulme1.oci_cloud.oci_db_system:
    db_system_id: "{{ test_db_system_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
