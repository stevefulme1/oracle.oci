---
- name: Create a DRG
  stevefulme1.oci_cloud.oci_drg:
    compartment_id: "{{ oci_compartment_id }}"
    display_name: "{{ oci_drg_display_name }}"
    state: present
  register: create_result
- name: Verify DRG was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_drg_display_name
      - create_result.resource.id is defined
- name: Set DRG ID fact
  ansible.builtin.set_fact:
    test_drg_id: "{{ create_result.resource.id }}"
- name: Create same DRG again (idempotency check)
  stevefulme1.oci_cloud.oci_drg:
    drg_id: "{{ test_drg_id }}"
    compartment_id: "{{ oci_compartment_id }}"
    display_name: "{{ oci_drg_display_name }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update DRG display_name
  stevefulme1.oci_cloud.oci_drg:
    drg_id: "{{ test_drg_id }}"
    display_name: "{{ oci_drg_updated_display_name }}"
    state: present
  register: update_result
- name: Verify DRG was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_drg_updated_display_name
- name: Delete the DRG
  stevefulme1.oci_cloud.oci_drg:
    drg_id: "{{ test_drg_id }}"
    state: absent
  register: delete_result
- name: Verify DRG was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete DRG again (already gone)
  stevefulme1.oci_cloud.oci_drg:
    drg_id: "{{ test_drg_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
