---
- name: Create a log group
  stevefulme1.oci_cloud.oci_log_group:
    compartment_id: "{{ oci_log_group_compartment_id }}"
    display_name: "{{ oci_log_group_display_name }}"
    description: "{{ oci_log_group_description | default(omit) }}"
    state: present
  register: create_result
- name: Verify log group was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_log_group_display_name
      - create_result.resource.lifecycle_state == "ACTIVE"
      - create_result.resource.id is defined
- name: Set log group ID fact
  ansible.builtin.set_fact:
    test_log_group_id: "{{ create_result.resource.id }}"
- name: Create same log group again (idempotency check)
  stevefulme1.oci_cloud.oci_log_group:
    compartment_id: "{{ oci_log_group_compartment_id }}"
    log_group_id: "{{ test_log_group_id }}"
    display_name: "{{ oci_log_group_display_name }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update log group display_name
  stevefulme1.oci_cloud.oci_log_group:
    compartment_id: "{{ oci_log_group_compartment_id }}"
    log_group_id: "{{ test_log_group_id }}"
    display_name: "{{ oci_log_group_updated_display_name }}"
    state: present
  register: update_result
- name: Verify log group was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_log_group_updated_display_name
- name: Delete the log group
  stevefulme1.oci_cloud.oci_log_group:
    log_group_id: "{{ test_log_group_id }}"
    state: absent
  register: delete_result
- name: Verify log group was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete log group again (already gone)
  stevefulme1.oci_cloud.oci_log_group:
    log_group_id: "{{ test_log_group_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
