---
- name: Create a tag definition
  stevefulme1.oci_cloud.oci_tag:
    tag_namespace_id: "{{ oci_tag_tag_namespace_id }}"
    name: "{{ oci_tag_name }}"
    description: "{{ oci_tag_description }}"
    state: present
  register: create_result
- name: Verify tag was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.name == oci_tag_name
      - create_result.resource.description == oci_tag_description
      - create_result.resource.id is defined
- name: Set tag ID fact
  ansible.builtin.set_fact:
    test_tag_id: "{{ create_result.resource.id }}"
- name: Create same tag again (idempotency check)
  stevefulme1.oci_cloud.oci_tag:
    tag_namespace_id: "{{ oci_tag_tag_namespace_id }}"
    tag_id: "{{ test_tag_id }}"
    name: "{{ oci_tag_name }}"
    description: "{{ oci_tag_description }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update tag description
  stevefulme1.oci_cloud.oci_tag:
    tag_id: "{{ test_tag_id }}"
    description: "{{ oci_tag_updated_description }}"
    state: present
  register: update_result
- name: Verify tag was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.description == oci_tag_updated_description
- name: Delete the tag
  stevefulme1.oci_cloud.oci_tag:
    tag_id: "{{ test_tag_id }}"
    state: absent
  register: delete_result
- name: Verify tag was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete tag again (already gone)
  stevefulme1.oci_cloud.oci_tag:
    tag_id: "{{ test_tag_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
