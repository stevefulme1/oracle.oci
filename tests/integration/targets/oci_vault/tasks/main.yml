---
- name: Create vault
  stevefulme1.oci_cloud.oci_vault:
    display_name: "{{ oci_test_vault_name }}"
    compartment_id: "{{ oci_test_compartment_id }}"
    state: present
  register: create_result

- name: Verify creation
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.vault is defined
      - create_result.vault.display_name == oci_test_vault_name

- name: Create same vault again (idempotency)
  stevefulme1.oci_cloud.oci_vault:
    display_name: "{{ oci_test_vault_name }}"
    compartment_id: "{{ oci_test_compartment_id }}"
    state: present
  register: idem_result

- name: Verify idempotency
  ansible.builtin.assert:
    that:
      - idem_result is not changed

- name: Delete vault
  stevefulme1.oci_cloud.oci_vault:
    display_name: "{{ oci_test_vault_name }}"
    state: absent
  register: delete_result

- name: Verify deletion
  ansible.builtin.assert:
    that:
      - delete_result is changed

- name: Delete again (idempotency)
  stevefulme1.oci_cloud.oci_vault:
    display_name: "{{ oci_test_vault_name }}"
    state: absent
  register: delete_idem

- name: Verify delete idempotency
  ansible.builtin.assert:
    that:
      - delete_idem is not changed
