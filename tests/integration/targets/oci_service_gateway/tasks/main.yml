---
- name: Create a service gateway
  stevefulme1.oci_cloud.oci_service_gateway:
    compartment_id: "{{ oci_compartment_id }}"
    vcn_id: "{{ oci_service_gateway_vcn_id }}"
    display_name: "{{ oci_service_gateway_display_name }}"
    services: "{{ oci_service_gateway_services }}"
    state: present
  register: create_result
- name: Verify service gateway was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_service_gateway_display_name
      - create_result.resource.id is defined
- name: Set service gateway ID fact
  ansible.builtin.set_fact:
    test_service_gateway_id: "{{ create_result.resource.id }}"
- name: Create same service gateway again (idempotency check)
  stevefulme1.oci_cloud.oci_service_gateway:
    service_gateway_id: "{{ test_service_gateway_id }}"
    compartment_id: "{{ oci_compartment_id }}"
    vcn_id: "{{ oci_service_gateway_vcn_id }}"
    display_name: "{{ oci_service_gateway_display_name }}"
    services: "{{ oci_service_gateway_services }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update service gateway display_name
  stevefulme1.oci_cloud.oci_service_gateway:
    service_gateway_id: "{{ test_service_gateway_id }}"
    display_name: "{{ oci_service_gateway_updated_display_name }}"
    state: present
  register: update_result
- name: Verify service gateway was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_service_gateway_updated_display_name
- name: Delete the service gateway
  stevefulme1.oci_cloud.oci_service_gateway:
    service_gateway_id: "{{ test_service_gateway_id }}"
    state: absent
  register: delete_result
- name: Verify service gateway was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete service gateway again (already gone)
  stevefulme1.oci_cloud.oci_service_gateway:
    service_gateway_id: "{{ test_service_gateway_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
