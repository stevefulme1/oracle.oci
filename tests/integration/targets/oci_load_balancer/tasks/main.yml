---
- name: Create a load balancer
  stevefulme1.oci_cloud.oci_load_balancer:
    compartment_id: "{{ oci_load_balancer_compartment_id }}"
    display_name: "{{ oci_load_balancer_display_name }}"
    shape_name: "{{ oci_load_balancer_shape_name }}"
    subnet_ids: "{{ oci_load_balancer_subnet_ids }}"
    is_private: "{{ oci_load_balancer_is_private | default(false) }}"
    state: present
  register: create_result
- name: Verify load balancer was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_load_balancer_display_name
      - create_result.resource.lifecycle_state == "ACTIVE"
      - create_result.resource.id is defined
- name: Set load balancer ID fact
  ansible.builtin.set_fact:
    test_load_balancer_id: "{{ create_result.resource.id }}"
- name: Create same load balancer again (idempotency check)
  stevefulme1.oci_cloud.oci_load_balancer:
    compartment_id: "{{ oci_load_balancer_compartment_id }}"
    load_balancer_id: "{{ test_load_balancer_id }}"
    display_name: "{{ oci_load_balancer_display_name }}"
    shape_name: "{{ oci_load_balancer_shape_name }}"
    subnet_ids: "{{ oci_load_balancer_subnet_ids }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update load balancer display_name
  stevefulme1.oci_cloud.oci_load_balancer:
    compartment_id: "{{ oci_load_balancer_compartment_id }}"
    load_balancer_id: "{{ test_load_balancer_id }}"
    display_name: "{{ oci_load_balancer_updated_display_name }}"
    shape_name: "{{ oci_load_balancer_shape_name }}"
    subnet_ids: "{{ oci_load_balancer_subnet_ids }}"
    state: present
  register: update_result
- name: Verify load balancer was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_load_balancer_updated_display_name
- name: Delete the load balancer
  stevefulme1.oci_cloud.oci_load_balancer:
    load_balancer_id: "{{ test_load_balancer_id }}"
    state: absent
  register: delete_result
- name: Verify load balancer was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete load balancer again (already gone)
  stevefulme1.oci_cloud.oci_load_balancer:
    load_balancer_id: "{{ test_load_balancer_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
