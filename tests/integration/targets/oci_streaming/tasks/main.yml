---
- name: Create a stream
  stevefulme1.oci_cloud.oci_streaming:
    compartment_id: "{{ oci_streaming_compartment_id }}"
    name: "{{ oci_streaming_name }}"
    partitions: "{{ oci_streaming_partitions }}"
    retention_in_hours: "{{ oci_streaming_retention_in_hours | default(24) }}"
    state: present
  register: create_result
- name: Verify stream was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.name == oci_streaming_name
      - create_result.resource.lifecycle_state == "ACTIVE"
      - create_result.resource.id is defined
- name: Set stream ID fact
  ansible.builtin.set_fact:
    test_streaming_id: "{{ create_result.resource.id }}"
- name: Create same stream again (idempotency check)
  stevefulme1.oci_cloud.oci_streaming:
    compartment_id: "{{ oci_streaming_compartment_id }}"
    stream_id: "{{ test_streaming_id }}"
    name: "{{ oci_streaming_name }}"
    partitions: "{{ oci_streaming_partitions }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Delete the stream
  stevefulme1.oci_cloud.oci_streaming:
    stream_id: "{{ test_streaming_id }}"
    state: absent
  register: delete_result
- name: Verify stream was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete stream again (already gone)
  stevefulme1.oci_cloud.oci_streaming:
    stream_id: "{{ test_streaming_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
