---
- name: Create a custom image from an instance
  stevefulme1.oci_cloud.oci_image:
    compartment_id: "{{ oci_compartment_id }}"
    instance_id: "{{ oci_image_instance_id }}"
    display_name: "{{ oci_image_display_name }}"
    state: present
  register: create_result
- name: Verify image was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_image_display_name
      - create_result.resource.id is defined
- name: Set image ID fact
  ansible.builtin.set_fact:
    test_image_id: "{{ create_result.resource.id }}"
- name: Create same image again (idempotency check)
  stevefulme1.oci_cloud.oci_image:
    image_id: "{{ test_image_id }}"
    compartment_id: "{{ oci_compartment_id }}"
    display_name: "{{ oci_image_display_name }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update image display_name
  stevefulme1.oci_cloud.oci_image:
    image_id: "{{ test_image_id }}"
    display_name: "{{ oci_image_updated_display_name }}"
    state: present
  register: update_result
- name: Verify image was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_image_updated_display_name
- name: Delete the image
  stevefulme1.oci_cloud.oci_image:
    image_id: "{{ test_image_id }}"
    state: absent
  register: delete_result
- name: Verify image was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete image again (already gone)
  stevefulme1.oci_cloud.oci_image:
    image_id: "{{ test_image_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
