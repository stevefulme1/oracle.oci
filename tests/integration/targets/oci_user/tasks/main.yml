---
- name: Create a user
  stevefulme1.oci_cloud.oci_user:
    compartment_id: "{{ oci_user_compartment_id }}"
    name: "{{ oci_user_name }}"
    description: "{{ oci_user_description }}"
    email: "{{ oci_user_email }}"
    state: present
  register: create_result
- name: Verify user was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.name == oci_user_name
      - create_result.resource.description == oci_user_description
      - create_result.resource.id is defined
- name: Set user ID fact
  ansible.builtin.set_fact:
    test_user_id: "{{ create_result.resource.id }}"
- name: Create same user again (idempotency check)
  stevefulme1.oci_cloud.oci_user:
    compartment_id: "{{ oci_user_compartment_id }}"
    user_id: "{{ test_user_id }}"
    name: "{{ oci_user_name }}"
    description: "{{ oci_user_description }}"
    email: "{{ oci_user_email }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update user description
  stevefulme1.oci_cloud.oci_user:
    user_id: "{{ test_user_id }}"
    description: "{{ oci_user_updated_description }}"
    state: present
  register: update_result
- name: Verify user was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.description == oci_user_updated_description
- name: Delete the user
  stevefulme1.oci_cloud.oci_user:
    user_id: "{{ test_user_id }}"
    state: absent
  register: delete_result
- name: Verify user was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete user again (already gone)
  stevefulme1.oci_cloud.oci_user:
    user_id: "{{ test_user_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
