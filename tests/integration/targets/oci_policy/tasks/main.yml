---
- name: Create a policy
  stevefulme1.oci_cloud.oci_policy:
    compartment_id: "{{ oci_policy_compartment_id }}"
    name: "{{ oci_policy_name }}"
    description: "{{ oci_policy_description }}"
    statements: "{{ oci_policy_statements }}"
    state: present
  register: create_result
- name: Verify policy was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.name == oci_policy_name
      - create_result.resource.description == oci_policy_description
      - create_result.resource.id is defined
- name: Set policy ID fact
  ansible.builtin.set_fact:
    test_policy_id: "{{ create_result.resource.id }}"
- name: Create same policy again (idempotency check)
  stevefulme1.oci_cloud.oci_policy:
    compartment_id: "{{ oci_policy_compartment_id }}"
    policy_id: "{{ test_policy_id }}"
    name: "{{ oci_policy_name }}"
    description: "{{ oci_policy_description }}"
    statements: "{{ oci_policy_statements }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update policy statements
  stevefulme1.oci_cloud.oci_policy:
    policy_id: "{{ test_policy_id }}"
    statements: "{{ oci_policy_updated_statements }}"
    state: present
  register: update_result
- name: Verify policy was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
- name: Delete the policy
  stevefulme1.oci_cloud.oci_policy:
    policy_id: "{{ test_policy_id }}"
    state: absent
  register: delete_result
- name: Verify policy was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete policy again (already gone)
  stevefulme1.oci_cloud.oci_policy:
    policy_id: "{{ test_policy_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
