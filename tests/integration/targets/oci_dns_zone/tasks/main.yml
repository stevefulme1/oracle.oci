---
- name: Create a DNS zone
  stevefulme1.oci_cloud.oci_dns_zone:
    compartment_id: "{{ oci_dns_zone_compartment_id }}"
    name: "{{ oci_dns_zone_name }}"
    zone_type: "{{ oci_dns_zone_zone_type | default('PRIMARY') }}"
    state: present
  register: create_result
- name: Verify DNS zone was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.name == oci_dns_zone_name
      - create_result.resource.lifecycle_state == "ACTIVE"
      - create_result.resource.id is defined
- name: Set DNS zone ID fact
  ansible.builtin.set_fact:
    test_dns_zone_id: "{{ create_result.resource.id }}"
- name: Create same DNS zone again (idempotency check)
  stevefulme1.oci_cloud.oci_dns_zone:
    compartment_id: "{{ oci_dns_zone_compartment_id }}"
    dns_zone_id: "{{ test_dns_zone_id }}"
    name: "{{ oci_dns_zone_name }}"
    zone_type: "{{ oci_dns_zone_zone_type | default('PRIMARY') }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Delete the DNS zone
  stevefulme1.oci_cloud.oci_dns_zone:
    dns_zone_id: "{{ test_dns_zone_id }}"
    state: absent
  register: delete_result
- name: Verify DNS zone was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete DNS zone again (already gone)
  stevefulme1.oci_cloud.oci_dns_zone:
    dns_zone_id: "{{ test_dns_zone_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
