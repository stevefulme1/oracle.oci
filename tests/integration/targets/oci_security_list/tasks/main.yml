---
- name: Create a security list
  oracle.oci.oci_security_list:
    compartment_id: "{{ oci_security_list_compartment_id }}"
    vcn_id: "{{ oci_security_list_vcn_id }}"
    display_name: "{{ oci_security_list_display_name }}"
    ingress_security_rules: "{{ oci_security_list_ingress_rules }}"
    egress_security_rules: "{{ oci_security_list_egress_rules }}"
    state: present
  register: create_result
- name: Verify security list was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_security_list_display_name
      - create_result.resource.lifecycle_state == "AVAILABLE"
      - create_result.resource.id is defined
      - create_result.resource.ingress_security_rules | length == 2
      - create_result.resource.egress_security_rules | length == 1
- name: Set security list ID fact
  ansible.builtin.set_fact:
    test_security_list_id: "{{ create_result.resource.id }}"
- name: Create same security list again (idempotency check)
  oracle.oci.oci_security_list:
    compartment_id: "{{ oci_security_list_compartment_id }}"
    vcn_id: "{{ oci_security_list_vcn_id }}"
    security_list_id: "{{ test_security_list_id }}"
    display_name: "{{ oci_security_list_display_name }}"
    ingress_security_rules: "{{ oci_security_list_ingress_rules }}"
    egress_security_rules: "{{ oci_security_list_egress_rules }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update security list display_name
  oracle.oci.oci_security_list:
    compartment_id: "{{ oci_security_list_compartment_id }}"
    vcn_id: "{{ oci_security_list_vcn_id }}"
    security_list_id: "{{ test_security_list_id }}"
    display_name: "{{ oci_security_list_updated_display_name }}"
    ingress_security_rules: "{{ oci_security_list_ingress_rules }}"
    egress_security_rules: "{{ oci_security_list_egress_rules }}"
    state: present
  register: update_result
- name: Verify security list was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_security_list_updated_display_name
- name: Delete the security list
  oracle.oci.oci_security_list:
    security_list_id: "{{ test_security_list_id }}"
    state: absent
  register: delete_result
- name: Verify security list was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete security list again (already gone)
  oracle.oci.oci_security_list:
    security_list_id: "{{ test_security_list_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
