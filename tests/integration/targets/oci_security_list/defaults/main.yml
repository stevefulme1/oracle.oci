---
oci_security_list_compartment_id: "{{ lookup('env', 'OCI_COMPARTMENT_ID') }}"
oci_security_list_vcn_id: "{{ lookup('env', 'OCI_VCN_ID') }}"
oci_security_list_display_name: "ansible-integration-test-seclist"
oci_security_list_updated_display_name: "ansible-integration-test-seclist-updated"
oci_security_list_ingress_rules:
  - protocol: "6"
    source: "0.0.0.0/0"
    tcp_options:
      destination_port_range:
        min: 22
        max: 22
  - protocol: "6"
    source: "0.0.0.0/0"
    tcp_options:
      destination_port_range:
        min: 443
        max: 443
oci_security_list_egress_rules:
  - protocol: "all"
    destination: "0.0.0.0/0"
