---
- name: Create a block volume
  stevefulme1.oci_cloud.oci_volume:
    compartment_id: "{{ oci_compartment_id }}"
    availability_domain: "{{ oci_volume_availability_domain }}"
    display_name: "{{ oci_volume_display_name }}"
    size_in_gbs: "{{ oci_volume_size_in_gbs }}"
    state: present
  register: create_result
- name: Verify volume was created
  ansible.builtin.assert:
    that:
      - create_result is changed
      - create_result.resource.display_name == oci_volume_display_name
      - create_result.resource.id is defined
- name: Set volume ID fact
  ansible.builtin.set_fact:
    test_volume_id: "{{ create_result.resource.id }}"
- name: Create same volume again (idempotency check)
  stevefulme1.oci_cloud.oci_volume:
    volume_id: "{{ test_volume_id }}"
    compartment_id: "{{ oci_compartment_id }}"
    availability_domain: "{{ oci_volume_availability_domain }}"
    display_name: "{{ oci_volume_display_name }}"
    size_in_gbs: "{{ oci_volume_size_in_gbs }}"
    state: present
  register: idempotent_result
- name: Verify no change on idempotent run
  ansible.builtin.assert:
    that:
      - idempotent_result is not changed
- name: Update volume display_name
  stevefulme1.oci_cloud.oci_volume:
    volume_id: "{{ test_volume_id }}"
    display_name: "{{ oci_volume_updated_display_name }}"
    state: present
  register: update_result
- name: Verify volume was updated
  ansible.builtin.assert:
    that:
      - update_result is changed
      - update_result.resource.display_name == oci_volume_updated_display_name
- name: Delete the volume
  stevefulme1.oci_cloud.oci_volume:
    volume_id: "{{ test_volume_id }}"
    state: absent
  register: delete_result
- name: Verify volume was deleted
  ansible.builtin.assert:
    that:
      - delete_result is changed
- name: Delete volume again (already gone)
  stevefulme1.oci_cloud.oci_volume:
    volume_id: "{{ test_volume_id }}"
    state: absent
  register: delete_again_result
- name: Verify no change when already deleted
  ansible.builtin.assert:
    that:
      - delete_again_result is not changed
